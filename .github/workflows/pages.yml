name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build WebGPU cinematic Earth
        working-directory: webgpu-earth
        run: |
          npm ci
          npm run build
      - name: Stage WebGPU build into site (/webgpu)
        run: |
          mkdir -p ./webgpu
          cp -r webgpu-earth/dist/. ./webgpu/
          # Keep the published artifact lean: drop sources only Pages doesn't serve.
          rm -rf webgpu-earth/node_modules webgpu-earth/dist
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
