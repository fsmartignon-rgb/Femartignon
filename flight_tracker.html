<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlightTrack — Live Flight Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* --- Reset & Base --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --surface: #F7F8FA;
      --border: #E2E5EA;
      --text: #111111;
      --text-secondary: #666666;
      --accent: #2F80ED;
      --accent-hover: #1A6DD4;
      --green: #27AE60;
      --orange: #F2994A;
      --red: #EB5757;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- Navbar --- */
    .navbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .navbar .tagline {
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-left: 1px solid var(--border);
      padding-left: 12px;
    }

    /* --- Main Layout --- */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    /* --- Search Section --- */
    .search-section { margin-bottom: 32px; }

    .search-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 20px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: #AAAAAA; }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47,128,237,0.15);
    }

    .search-btn {
      background: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: 24px;
      padding: 12px 28px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .search-btn:hover { background: var(--accent-hover); }
    .search-btn:active { transform: scale(0.96); }
    .search-btn:disabled {
      background: #CCCCCC;
      cursor: not-allowed;
    }

    /* --- Recent Searches --- */
    .recent-searches {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .recent-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .recent-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .recent-chip:hover { background: #E8F0FE; }

    /* --- Result Panel --- */
    #result-panel { margin-bottom: 32px; }

    /* --- Loading Spinner --- */
    .loading {
      text-align: center;
      padding: 48px 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* --- Error / Empty State --- */
    .state-message {
      text-align: center;
      padding: 40px 16px;
      animation: fadeIn 0.3s ease;
    }

    .state-message .icon { font-size: 2.5rem; margin-bottom: 12px; }

    .state-message .title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .state-message .subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* --- Flight Card --- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .flight-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .airline-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: contain;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .logo-fallback {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .flight-id {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .airline-name {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .badge.on-time   { background: rgba(39,174,96,0.1);  color: var(--green); }
    .badge.scheduled { background: rgba(47,128,237,0.1);  color: var(--accent); }
    .badge.active    { background: rgba(39,174,96,0.1);  color: var(--green); }
    .badge.delayed   { background: rgba(242,153,74,0.1); color: var(--orange); }
    .badge.cancelled { background: rgba(235,87,87,0.1);  color: var(--red); }
    .badge.landed    { background: rgba(47,128,237,0.1);  color: var(--accent); }
    .badge.diverted  { background: rgba(242,153,74,0.1); color: var(--orange); }
    .badge.incident  { background: rgba(235,87,87,0.1);  color: var(--red); }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    /* --- Route Section --- */
    .route-section {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .route-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .airport-block { text-align: center; min-width: 60px; }

    .iata {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .city {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .route-line {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .route-line-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      position: relative;
    }

    .route-line-bar::after {
      content: '✈';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1rem;
      color: var(--accent);
    }

    /* --- Details Grid --- */
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-cell {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .detail-cell:nth-child(odd) { border-right: 1px solid var(--border); }

    .detail-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }

    .detail-value.muted { color: var(--text-secondary); }

    /* --- Map Section --- */
    .map-section {
      height: 220px;
      position: relative;
    }

    .map-section .leaflet-container {
      height: 100%;
      width: 100%;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .map-unavailable {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      .container { padding: 20px 12px; }
      .card-header { padding: 14px 16px; }
      .route-section { padding: 20px 16px; }
      .detail-cell { padding: 12px 16px; }
      .iata { font-size: 1.3rem; }
      .flight-id { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <span class="logo">✈ FlightTrack</span>
    <span class="tagline">Live Flight Tracker</span>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="container">

    <!-- ===== SEARCH SECTION ===== -->
    <section class="search-section">
      <div class="search-label">Track a flight</div>
      <div class="search-row">
        <input
          id="search-input"
          class="search-input"
          type="text"
          placeholder="Enter flight number (e.g. LA3535)"
          maxlength="10"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          oninput="toggleSearchBtn()"
        />
        <button id="search-btn" class="search-btn" onclick="searchFlight()" disabled>Search</button>
      </div>
      <div id="recent-searches" class="recent-searches"></div>
    </section>

    <!-- ===== RESULT PANEL ===== -->
    <section id="result-panel"></section>

  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    // ============================================================
    // CONFIGURATION — Replace with your AviationStack API key
    // ============================================================
    const API_KEY = "db67c322295f2e3ea94598c7fc934b90";
    const API_BASE = "http://api.aviationstack.com/v1/flights";
    const MAX_RECENT = 5;

    // ============================================================
    // SEARCH BUTTON STATE
    // ============================================================
    function toggleSearchBtn() {
      const input = document.getElementById('search-input');
      const btn = document.getElementById('search-btn');
      btn.disabled = !input.value.trim();
    }

    // ============================================================
    // FETCH FLIGHT DATA
    // ============================================================
    async function fetchFlightData(flightNumber) {
      const cleanFlight = flightNumber.replace(/\s+/g, '').toUpperCase();
      const url = `${API_BASE}?access_key=${encodeURIComponent(API_KEY)}&flight_iata=${encodeURIComponent(cleanFlight)}`;

      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`API returned status ${response.status}`);
      }

      const json = await response.json();

      if (json.error) {
        throw new Error(json.error.message || 'API error');
      }

      if (!json.data || json.data.length === 0) {
        return null;
      }

      return json.data[0];
    }

    // ============================================================
    // NORMALIZE FLIGHT DATA
    // ============================================================
    function normalizeFlightData(raw) {
      const safe = (val, fallback) => (val != null && val !== '') ? val : fallback;

      const depTime = raw.departure || {};
      const arrTime = raw.arrival || {};
      const airline = raw.airline || {};
      const flight = raw.flight || {};

      return {
        flightNumber: safe(flight.iata, safe(flight.icao, '—')),
        airlineName: safe(airline.name, 'Unknown Airline'),
        airlineIata: safe(airline.iata, ''),
        status: normalizeStatus(safe(raw.flight_status, 'unknown')),
        statusRaw: safe(raw.flight_status, 'unknown'),
        departure: {
          iata: safe(depTime.iata, '—'),
          city: safe(depTime.airport, '—'),
          scheduled: formatDateTime(depTime.scheduled),
          estimated: formatDateTime(depTime.estimated),
          actual: formatDateTime(depTime.actual),
          timezone: safe(depTime.timezone, ''),
          lat: depTime.latitude || null,
          lng: depTime.longitude || null
        },
        arrival: {
          iata: safe(arrTime.iata, '—'),
          city: safe(arrTime.airport, '—'),
          scheduled: formatDateTime(arrTime.scheduled),
          estimated: formatDateTime(arrTime.estimated),
          actual: formatDateTime(arrTime.actual),
          timezone: safe(arrTime.timezone, ''),
          lat: arrTime.latitude || null,
          lng: arrTime.longitude || null
        }
      };
    }

    // ============================================================
    // NORMALIZE STATUS
    // ============================================================
    function normalizeStatus(status) {
      const map = {
        'scheduled': { label: 'Scheduled', cls: 'scheduled' },
        'active':    { label: 'In Flight', cls: 'active' },
        'landed':    { label: 'Landed',    cls: 'landed' },
        'cancelled': { label: 'Cancelled', cls: 'cancelled' },
        'incident':  { label: 'Incident',  cls: 'incident' },
        'diverted':  { label: 'Diverted',  cls: 'diverted' },
        'delayed':   { label: 'Delayed',   cls: 'delayed' }
      };
      return map[status.toLowerCase()] || { label: status, cls: 'scheduled' };
    }

    // ============================================================
    // FORMAT DATE/TIME
    // ============================================================
    function formatDateTime(dateStr) {
      if (!dateStr) return '—';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '—';
        return d.toLocaleString('en-US', {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        });
      } catch {
        return '—';
      }
    }

    // ============================================================
    // GET AIRLINE LOGO
    // ============================================================
    function getAirlineLogo(iataCode) {
      if (!iataCode) return null;
      return `https://content.airhex.com/content/logos/airlines_${iataCode.toLowerCase()}_200_200_s.png`;
    }

    // ============================================================
    // RENDER FLIGHT CARD
    // ============================================================
    function renderFlightCard(data) {
      const panel = document.getElementById('result-panel');
      const logoUrl = getAirlineLogo(data.airlineIata);

      const logoHTML = logoUrl
        ? `<img class="airline-logo" src="${logoUrl}" alt="${data.airlineName}" onerror="this.outerHTML='<div class=\\'logo-fallback\\'>✈</div>'">`
        : `<div class="logo-fallback">✈</div>`;

      const depEstOrActual = data.departure.actual !== '—' ? data.departure.actual
        : data.departure.estimated !== '—' ? data.departure.estimated : null;
      const arrEstOrActual = data.arrival.actual !== '—' ? data.arrival.actual
        : data.arrival.estimated !== '—' ? data.arrival.estimated : null;

      const cardHTML = `
        <div class="flight-card">

          <!-- Header: logo + flight info + status -->
          <div class="card-header">
            <div class="header-left">
              ${logoHTML}
              <div>
                <div class="flight-id">${data.flightNumber}</div>
                <div class="airline-name">${data.airlineName}</div>
              </div>
            </div>
            <span class="badge ${data.status.cls}">
              <span class="badge-dot"></span>
              ${data.status.label}
            </span>
          </div>

          <!-- Route: origin → destination -->
          <div class="route-section">
            <div class="route-row">
              <div class="airport-block">
                <div class="iata">${data.departure.iata}</div>
                <div class="city">${data.departure.city}</div>
              </div>
              <div class="route-line">
                <div class="route-line-bar"></div>
              </div>
              <div class="airport-block">
                <div class="iata">${data.arrival.iata}</div>
                <div class="city">${data.arrival.city}</div>
              </div>
            </div>
          </div>

          <!-- Details grid -->
          <div class="details-grid">
            <div class="detail-cell">
              <div class="detail-label">Scheduled Departure</div>
              <div class="detail-value">${data.departure.scheduled}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">Scheduled Arrival</div>
              <div class="detail-value">${data.arrival.scheduled}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">${data.departure.actual !== '—' ? 'Actual Departure' : 'Estimated Departure'}</div>
              <div class="detail-value ${depEstOrActual ? '' : 'muted'}">${depEstOrActual || '—'}</div>
            </div>
            <div class="detail-cell">
              <div class="detail-label">${data.arrival.actual !== '—' ? 'Actual Arrival' : 'Estimated Arrival'}</div>
              <div class="detail-value ${arrEstOrActual ? '' : 'muted'}">${arrEstOrActual || '—'}</div>
            </div>
          </div>

          <!-- Map -->
          <div class="map-section" id="flight-map"></div>

        </div>
      `;

      panel.innerHTML = cardHTML;
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

      renderMap(data.departure, data.arrival);
    }

    // ============================================================
    // RENDER MAP (LEAFLET)
    // ============================================================
    function renderMap(dep, arr) {
      const mapEl = document.getElementById('flight-map');
      if (!mapEl) return;

      const hasCoords = dep.lat != null && dep.lng != null && arr.lat != null && arr.lng != null;

      if (!hasCoords) {
        mapEl.innerHTML = '<div class="map-unavailable">Map unavailable — coordinates not provided</div>';
        return;
      }

      const map = L.map(mapEl, {
        scrollWheelZoom: false,
        attributionControl: true
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const depLatLng = [parseFloat(dep.lat), parseFloat(dep.lng)];
      const arrLatLng = [parseFloat(arr.lat), parseFloat(arr.lng)];

      L.marker(depLatLng).addTo(map).bindPopup(`<strong>${dep.iata}</strong><br>${dep.city}`);
      L.marker(arrLatLng).addTo(map).bindPopup(`<strong>${arr.iata}</strong><br>${arr.city}`);

      L.polyline([depLatLng, arrLatLng], {
        color: '#2F80ED',
        weight: 2,
        dashArray: '6, 8'
      }).addTo(map);

      const bounds = L.latLngBounds([depLatLng, arrLatLng]);
      map.fitBounds(bounds, { padding: [30, 30] });
    }

    // ============================================================
    // SHOW LOADING STATE
    // ============================================================
    function showLoading() {
      const panel = document.getElementById('result-panel');
      panel.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">Searching flight…</div>
        </div>
      `;
    }

    // ============================================================
    // SHOW ERROR / EMPTY STATE
    // ============================================================
    function showError(query, message) {
      const panel = document.getElementById('result-panel');
      panel.innerHTML = `
        <div class="state-message">
          <div class="icon">✈️</div>
          <div class="title">No flight found for "${query}"</div>
          <div class="subtitle">${message || 'Please check the flight number and try again.'}</div>
        </div>
      `;
    }

    // ============================================================
    // RECENT SEARCHES (localStorage)
    // ============================================================
    function getRecentSearches() {
      try {
        const stored = localStorage.getItem('recentSearches');
        return stored ? JSON.parse(stored) : [];
      } catch {
        return [];
      }
    }

    function saveSearch(flightNumber) {
      const upper = flightNumber.toUpperCase();
      let recent = getRecentSearches().filter(s => s !== upper);
      recent.unshift(upper);
      if (recent.length > MAX_RECENT) recent = recent.slice(0, MAX_RECENT);
      localStorage.setItem('recentSearches', JSON.stringify(recent));
      renderRecentSearches();
    }

    function renderRecentSearches() {
      const container = document.getElementById('recent-searches');
      const recent = getRecentSearches();

      if (recent.length === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML =
        '<span class="recent-label">Recent:</span>' +
        recent.map(s => `<button class="recent-chip" onclick="searchFromRecent('${s}')">${s}</button>`).join('');
    }

    function searchFromRecent(flightNumber) {
      const input = document.getElementById('search-input');
      input.value = flightNumber;
      toggleSearchBtn();
      searchFlight();
    }

    // ============================================================
    // SEARCH FLIGHT (main entry point)
    // ============================================================
    async function searchFlight() {
      const input = document.getElementById('search-input');
      const query = input.value.trim().toUpperCase();

      if (!query) return;

      showLoading();
      saveSearch(query);

      try {
        const rawData = await fetchFlightData(query);

        if (!rawData) {
          showError(query);
          return;
        }

        const normalized = normalizeFlightData(rawData);
        renderFlightCard(normalized);
      } catch (err) {
        showError(query, err.message || 'An error occurred. Please try again.');
      }
    }

    // ============================================================
    // INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('search-input');
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') searchFlight();
      });

      toggleSearchBtn();
      renderRecentSearches();
    });
  </script>

</body>
</html>
